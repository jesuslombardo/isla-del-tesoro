name: Deploy a GitHub Pages

# Publica el juego (sitio estático) en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita Pages automáticamente si aún no lo está (usa el token del workflow).
          enablement: true

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          # El juego vive en la raíz del repo (index.html + src/ + vendor/)
          path: '.'

      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
